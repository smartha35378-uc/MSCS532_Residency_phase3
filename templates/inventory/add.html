{% extends "inventory/base.html" %}
{% block title %}Add/Upsert · Inventory Treap PoC{% endblock %}
{% block content %}
  <div class="card" style="margin-top:16px;">
    <h2 style="margin-top:0;">Add / Upsert Item</h2>
    <form method="post" action="{% url 'ui_add' %}">
      {% csrf_token %}
      <div class="grid">
        <div>
          <label>SKU</label>
          <input type="text" name="sku" required placeholder="e.g., E5001" value="{{ form.sku|default:'' }}">
        </div>
        <div>
          <label>Name</label>
          <input type="text" name="name" required placeholder="e.g., Monitor 24in" value="{{ form.name|default:'' }}">
        </div>
        <div>
          <label>Quantity</label>
          <input type="number" name="quantity" required min="0" value="{{ form.quantity|default:'0' }}">
        </div>
        <div>
          <label>Price</label>
          <input type="number" step="0.01" name="price" required min="0" value="{{ form.price|default:'0.00' }}">
        </div>
      </div>
      <div class="row" style="margin-top:12px;">
        <button type="submit">Save</button>
        <a href="{% url 'ui_items' %}">View items</a>
      </div>
    </form>
  </div>
{% endblock %}
